name: Dashboard v1.0.0

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Feds Dash iOS Build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Link ios folder into dash
        run: rm -rf ${{ github.workspace }}/dash/ios && ln -s ${{ github.workspace }}/ios ${{ github.workspace }}/dash/ios

      - run: flutter pub get
        working-directory: dash

      - name: Generate iOS app icons
        run: dart run flutter_launcher_icons
        working-directory: dash

      - name: Generate Flutter xcconfig
        run: |
          cat > ios/Flutter/Generated.xcconfig << 'EOF'
          FLUTTER_ROOT=/Users/runner/hostedtoolcache/flutter/stable-latest-arm64/x64
          FLUTTER_APPLICATION_PATH=${{ github.workspace }}/dash
          COCOAPODS_PARALLEL_CODE_SIGN=true
          FLUTTER_TARGET=${{ github.workspace }}/dash/lib/main.dart
          FLUTTER_BUILD_DIR=build
          FLUTTER_BUILD_NAME=1.0.0
          FLUTTER_BUILD_NUMBER=1
          DART_OBFUSCATION=false
          TRACK_WIDGET_CREATION=false
          TREE_SHAKE_ICONS=false
          PACKAGE_CONFIG=${{ github.workspace }}/dash/.dart_tool/package_config.json
          EOF
        working-directory: dash

      - name: Install pods
        run: pod install
        working-directory: dash/ios

      - name: Build iOS with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build
        working-directory: dash

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/ios/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -qq -r -9 "Feds Dash v1.0.0.ipa" Payload
        working-directory: dash

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "dash/Feds Dash v1.0.0.ipa"
          tag: v1.0.0
          release_name: Dashboard v1.0.0
          overwrite: true
          body: "first release"
