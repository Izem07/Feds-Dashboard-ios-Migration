name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: iOS App Build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get
        working-directory: scouting/dash

      - name: Generate iOS app icons
        run: flutter pub run flutter_launcher_icons
        working-directory: scouting/dash

      - run: pod repo update
        working-directory: scouting/dash/ios

      - run: flutter build ios --release --no-codesign
        working-directory: scouting/dash

      - run: mkdir Payload
        working-directory: scouting/dash/build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: scouting/dash/build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 "ScoutOps Dash v1.0.0.ipa" Payload
        working-directory: scouting/dash/build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "scouting/dash/build/ios/iphoneos/ScoutOps Dash v1.0.0.ipa"
          tag: v1.0.0
          overwrite: true
          body: "first release"
