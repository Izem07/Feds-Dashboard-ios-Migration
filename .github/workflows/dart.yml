name: Dashboard v1.0.0

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Feds Dash iOS Build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Link ios folder into dash
        run: rm -rf "$GITHUB_WORKSPACE/dash/ios" && ln -s "$GITHUB_WORKSPACE/ios" "$GITHUB_WORKSPACE/dash/ios"

      - name: Flutter pub get
        run: flutter pub get
        working-directory: dash

      - name: Generate iOS app icons
        run: dart run flutter_launcher_icons
        working-directory: dash

      - name: Generate Flutter xcconfig
        run: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          APP_PATH="$GITHUB_WORKSPACE/dash"
          {
            echo "FLUTTER_ROOT=$FLUTTER_ROOT"
            echo "FLUTTER_APPLICATION_PATH=$APP_PATH"
            echo "COCOAPODS_PARALLEL_CODE_SIGN=true"
            echo "FLUTTER_TARGET=$APP_PATH/lib/main.dart"
            echo "FLUTTER_BUILD_DIR=build"
            echo "FLUTTER_BUILD_NAME=1.0.0"
            echo "FLUTTER_BUILD_NUMBER=1"
            echo "DART_OBFUSCATION=false"
            echo "TRACK_WIDGET_CREATION=false"
            echo "TREE_SHAKE_ICONS=false"
            echo "PACKAGE_CONFIG=$APP_PATH/.dart_tool/package_config.json"
          } > "$GITHUB_WORKSPACE/ios/Flutter/Generated.xcconfig"

      - name: Install pods
        run: pod install
        working-directory: dash/ios

      - name: Build iOS
        run: flutter build ios --release --no-codesign --no-tree-shake-icons
        working-directory: dash

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qq -r -9 "Feds Dash v1.0.0.ipa" Payload
        working-directory: dash

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "dash/Feds Dash v1.0.0.ipa"
          tag: v1.0.0
          release_name: Dashboard v1.0.0
          overwrite: true
          body: "first release"
