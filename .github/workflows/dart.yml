name: Dashboard v1.0.1

on:
  workflow_dispatch:
  push:
    tags:
      - 'v1.0.1'

jobs:
  build-ios:
    name: Feds Dash iOS Build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Link ios into dash
        run: ln -sf "$GITHUB_WORKSPACE/ios" "$GITHUB_WORKSPACE/dash/ios"

      - name: Flutter pub get
        run: flutter pub get
        working-directory: dash

      - name: Generate iOS app icons
        run: dart run flutter_launcher_icons
        working-directory: dash

      - name: Pod install
        run: pod install --repo-update
        working-directory: dash/ios

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
        working-directory: dash

      - name: Package IPA
        run: |
          mkdir Payload
          mv Runner.app Payload
          zip -qq -r -9 "FedsDash-v1.0.1.ipa" Payload
        working-directory: dash/build/ios/iphoneos

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dash/build/ios/iphoneos/FedsDash-v1.0.1.ipa
          tag: v1.0.1
          release_name: "Dashboard v1.0.1"
          overwrite: true
          body: "iOS mobile UI, pre-filled event config"
